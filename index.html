<!DOCTYPE htm
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Jump 3D | Visible Edition</title>
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d9ff;
            --neon-pink: #ff0055;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon-green);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            pointer-events: auto;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        }

        #score-display {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 100;
        }

        h1 { margin: 0 0 10px 0; font-size: 42px; letter-spacing: 4px; color: var(--neon-green); }
        .subtitle { margin-bottom: 30px; opacity: 0.8; font-size: 14px; text-transform: uppercase; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        
        button {
            background: transparent; border: 2px solid; padding: 12px 30px;
            font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase;
        }
        .btn-easy { border-color: var(--neon-blue); color: var(--neon-blue); }
        .btn-easy:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        .btn-med { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-med:hover { background: var(--neon-green); color: black; box-shadow: 0 0 20px var(--neon-green); }
        .btn-hard { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-hard:hover { background: var(--neon-pink); color: black; box-shadow: 0 0 20px var(--neon-pink); }
        
        #game-over { display: none; border-color: var(--neon-pink); }
    </style>
</head>
<body>

    <div id="score-display">PUNKTY: 0 | POZIOM: -</div>

    <div id="ui-layer">
        <div id="menu" class="panel">
            <h1>geome3dash</h1>
            <p class="subtitle">SELECT LEVEL (STEROWANIE: A, D + SPACJA)</p>
            <div class="btn-group">
                <button class="btn-easy" onclick="initGame('easy')">EASY </button>
                <button class="btn-med" onclick="initGame('med')">MEDIUM </button>
                <button class="btn-hard" onclick="initGame('hard')">HARD </button>
            </div>
        </div>

        <div id="game-over" class="panel">
            <h1 style="color: var(--neon-pink);">GAME OVER</h1>
            <p id="final-score" style="font-size: 24px; margin: 20px 0;">Wynik: 0</p>
            <button class="btn-med" onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const LEVELS = {
            easy: { 
                speed: 0.18, spawnChance: 0.02, gravity: 0.008, jumpPower: 0.28, 
                color: 0x00d9ff, label: "EASY", fogColor: 0x001533
            },
            med:  { 
                speed: 0.32, spawnChance: 0.04, gravity: 0.012, jumpPower: 0.35, 
                color: 0x00ff88, label: "MEDIUM", fogColor: 0x051a05
            },
            hard: { 
                speed: 0.55, spawnChance: 0.07, gravity: 0.02, jumpPower: 0.48, 
                color: 0xff0055, label: "HARD", fogColor: 0x220005
            }
        };

        let currentConfig = LEVELS.med;
        let isPlaying = false;
        let score = 0;
        let speed = 0;
        const obstacles = [];
        const keys = { left: false, right: false, jump: false };
        let yVelocity = 0;
        let isGrounded = true;
        const clock = new THREE.Clock();

        // --- SCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 1, 80);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- OŚWIETLENIE ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- GRACZ ---
        const player = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ emissiveIntensity: 1 })
        );
        player.position.y = 0.5;
        scene.add(player);

        // --- PODŁOGA ---
        const grid = new THREE.GridHelper(2000, 100, 0x444444, 0x222222);
        scene.add(grid);

        window.initGame = (difficulty) => {
            currentConfig = LEVELS[difficulty];
            speed = currentConfig.speed;
            
            player.material.color.setHex(currentConfig.color);
            player.material.emissive.setHex(currentConfig.color);
            
            scene.background.setHex(currentConfig.fogColor);
            scene.fog.color.setHex(currentConfig.fogColor);
            ambientLight.color.setHex(currentConfig.color);
            ambientLight.intensity = 0.4;

            document.getElementById('menu').style.display = 'none';
            document.getElementById('score-display').innerText = `PUNKTY: 0 | POZIOM: ${currentConfig.label}`;
            
            isPlaying = true;
            clock.start();
        };

        // --- STEROWANIE ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.key === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.key === 'ArrowRight') keys.right = true;
            if (e.code === 'Space' || e.key === 'ArrowUp') keys.jump = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.key === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.key === 'ArrowRight') keys.right = false;
            if (e.code === 'Space' || e.key === 'ArrowUp') keys.jump = false;
        });

        function createObstacle() {
            const width = Math.random() * 3 + 1.5;
            const isTall = Math.random() > 0.8;
            const height = isTall ? 4 : 1.5;
            
            const obsMat = new THREE.MeshStandardMaterial({ 
                color: 0x333333, 
                emissive: currentConfig.color,
                emissiveIntensity: 0.8 
            });
            
            const obs = new THREE.Mesh(new THREE.BoxGeometry(width, height, 1.5), obsMat);
            obs.position.set((Math.random() - 0.5) * 12, height / 2, -70);
            scene.add(obs);
            obstacles.push(obs);
        }

        camera.position.set(0, 5, 10);
        camera.lookAt(0, 1, 0);

        function animate() {
            requestAnimationFrame(animate);
            if (!isPlaying) return;

            const delta = clock.getElapsedTime();

            // Ruch
            if (keys.left && player.position.x > -6) player.position.x -= 0.15;
            if (keys.right && player.position.x < 6) player.position.x += 0.15;

            // Skok
            if (keys.jump && isGrounded) {
                yVelocity = currentConfig.jumpPower;
                isGrounded = false;
            }
            if (!isGrounded) {
                player.position.y += yVelocity;
                yVelocity -= currentConfig.gravity;
                if (player.position.y <= 0.5) {
                    player.position.y = 0.5;
                    isGrounded = true;
                }
            }

            if (Math.random() < currentConfig.spawnChance) createObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += speed;

                // Pulsowanie
                const pulse = (Math.sin(delta * 4 + i) + 1) / 2;
                obstacles[i].material.emissiveIntensity = 0.5 + pulse * 1.5;

                // Kolizja
                const pBox = new THREE.Box3().setFromObject(player);
                const oBox = new THREE.Box3().setFromObject(obstacles[i]);

                if (pBox.intersectsBox(oBox)) {
                    isPlaying = false;
                    document.getElementById('final-score').innerText = "Twój wynik: " + Math.floor(score);
                    document.getElementById('game-over').style.display = 'block';
                }

                if (obstacles[i].position.z > 15) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score-display').innerText = `PUNKTY: ${Math.floor(score)} | POZIOM: ${currentConfig.label}`;
                    speed += 0.0001;
                }
            }

            grid.position.z += speed;
            if (grid.position.z >= 20) grid.position.z = 0;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>l>
